<!DOCTYPE html>
<html>
<head>
    <title>Bind Checker</title>
</head>
<body>

<h2>🔥 Account Tool</h2>

<input id="token" placeholder="Enter Token">
<input id="email" placeholder="Enter Email">

<br><br>

<button onclick="checkToken()">Check</button>
<button onclick="bindChange()">Bind Change</button>
<button onclick="unbind()">Unbind</button>

<script>
const BASE_URL = "https://YOUR-RENDER-URL";

async function checkToken() {
    let token = document.getElementById("token").value;

    let res = await fetch(BASE_URL + "/check", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({token})
    });

    let data = await res.json();
    alert(data.msg);
}

async function bindChange() {
    let token = document.getElementById("token").value;
    let email = document.getElementById("email").value;

    let res = await fetch(BASE_URL + "/bind-change", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({token, email})
    });

    let data = await res.json();
    alert(data.msg);
}

async function unbind() {
    let token = document.getElementById("token").value;

    let res = await fetch(BASE_URL + "/unbind", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({token})
    });

    let data = await res.json();
    alert(data.msg);
}
</script>

</body>
</html>
